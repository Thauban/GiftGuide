<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GiftGuide ER-Modell</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --ink: #1d2733;
      --muted: #657384;
      --blue: #1f4e79;
      --blue-2: #2f75b5;
      --line: #8da3b8;
      --pk: #0b5cad;
      --fk: #a15c00;
      --unique: #59636f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      padding: 14px 24px 12px;
      background: var(--panel);
      border-bottom: 1px solid #d6e0ea;
    }

    h1 {
      margin: 0 0 4px;
      color: var(--blue);
      font-size: 30px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .canvas-wrap {
      width: 100vw;
      height: calc(100vh - 82px);
      overflow: hidden;
      padding: 0;
      position: relative;
      background:
        linear-gradient(90deg, rgba(31, 78, 121, 0.05) 1px, transparent 1px),
        linear-gradient(0deg, rgba(31, 78, 121, 0.05) 1px, transparent 1px);
      background-size: 28px 28px;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }

    .canvas-wrap.dragging {
      cursor: grabbing;
    }

    svg {
      position: absolute;
      left: 0;
      top: 0;
      background: white;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      width: 2600px;
      height: 2200px;
      transform-origin: top left;
    }

    .section-label {
      font-size: 25px;
      font-weight: 700;
      fill: var(--blue);
    }

    .entity rect.outer {
      fill: #fbfdff;
      stroke: var(--blue);
      stroke-width: 2;
      rx: 8;
    }

    .entity rect.head {
      fill: var(--blue);
      rx: 8;
    }

    .entity text.title {
      fill: #fff;
      font-size: 18px;
      font-weight: 700;
    }

    .entity text.attr {
      fill: var(--ink);
      font-size: 14px;
    }

    .entity text.type {
      fill: var(--muted);
      font-size: 13px;
    }

    .tag {
      font-size: 11px;
      font-weight: 700;
    }

    .pk {
      fill: var(--pk);
    }

    .fk {
      fill: var(--fk);
    }

    .unique {
      fill: var(--unique);
    }

    .relationship {
      fill: none;
      stroke: #6f8fac;
      stroke-width: 3.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 1;
    }

    .cardinality {
      fill: #1f4e79;
      font-size: 18px;
      font-weight: 700;
    }

    .legend {
      fill: #ffffff;
      stroke: #c5d3e1;
      stroke-width: 1.5;
      rx: 8;
    }
  </style>
</head>
<body>
  <header>
    <h1>GiftGuide ER-Modell</h1>
    <p class="subtitle">Alle Tabellen, Attribute, PK/FK-Markierungen und Beziehungen.</p>
  </header>

  <main id="canvasWrap" class="canvas-wrap">
    <svg id="diagram" viewBox="0 0 2600 2200" role="img" aria-label="GiftGuide ER-Modell">
      <defs>
        <marker id="dot" markerWidth="10" markerHeight="10" refX="5" refY="5">
          <circle cx="5" cy="5" r="3.2" fill="#ffffff" stroke="#2f75b5" stroke-width="1.8"></circle>
        </marker>
      </defs>

      <text x="70" y="60" class="section-label">Stammdaten</text>
      <text x="70" y="560" class="section-label">Fragebogen</text>
      <text x="1320" y="500" class="section-label">Produkte und Empfehlungen</text>
      <text x="1320" y="1260" class="section-label">Nutzeraktionen und Verkäufe</text>
      <text x="600" y="1580" class="section-label">Erinnerungen</text>

      <g id="relationshipLines"></g>
      <g id="entities"></g>
      <g id="relationshipLabels"></g>

      <rect x="2200" y="50" width="330" height="145" class="legend"></rect>
      <text x="2220" y="82" font-size="18" font-weight="700" fill="#1f4e79">Legende</text>
      <text x="2220" y="114" font-size="15" font-weight="700" fill="#0b5cad">PK = Primärschlüssel</text>
      <text x="2220" y="140" font-size="15" font-weight="700" fill="#a15c00">FK = Fremdschlüssel</text>
      <text x="2220" y="166" font-size="15" fill="#59636f">UNIQUE = eindeutiger Wert</text>
      <text x="2220" y="190" font-size="15" fill="#1f4e79">Linie: 1:n Beziehung</text>
    </svg>
  </main>

  <script>
    const entities = {
      role: {
        x: 70, y: 110, w: 320,
        attrs: [
          ["PK", "role_id", "INTEGER"],
          ["UNIQUE", "role_name", "TEXT"]
        ]
      },
      app_user: {
        x: 600, y: 90, w: 390,
        attrs: [
          ["PK", "user_id", "INTEGER"],
          ["FK", "role_id", "INTEGER"],
          ["", "username", "TEXT"],
          ["UNIQUE", "email", "TEXT"],
          ["", "password_hash", "TEXT"],
          ["", "preferred_language", "TEXT"],
          ["", "created_at", "TIMESTAMP"],
          ["", "is_guest", "BOOLEAN"]
        ]
      },
      partner_shop: {
        x: 1160, y: 110, w: 380,
        attrs: [
          ["PK", "partner_shop_id", "INTEGER"],
          ["FK", "role_id", "INTEGER"],
          ["UNIQUE", "shop_name", "TEXT"],
          ["", "website_url", "TEXT"],
          ["", "commission_rate", "NUMERIC"]
        ]
      },
      question: {
        x: 70, y: 620, w: 390,
        attrs: [
          ["PK", "question_id", "INTEGER"],
          ["", "question_text", "TEXT"],
          ["", "question_type", "TEXT"],
          ["", "display_order", "INTEGER"],
          ["", "is_active", "BOOLEAN"]
        ]
      },
      question_option: {
        x: 620, y: 610, w: 430,
        attrs: [
          ["PK", "question_option_id", "INTEGER"],
          ["FK", "question_id", "INTEGER"],
          ["", "option_text", "TEXT"],
          ["", "option_value", "TEXT"],
          ["", "sort_order", "INTEGER"]
        ]
      },
      question_rule: {
        x: 70, y: 980, w: 430,
        attrs: [
          ["PK", "question_rule_id", "INTEGER"],
          ["FK", "question_id", "INTEGER"],
          ["FK", "question_option_id", "INTEGER"],
          ["FK", "next_question_id", "INTEGER"],
          ["", "condition_value", "TEXT"]
        ]
      },
      questionnaire_session: {
        x: 620, y: 1010, w: 450,
        attrs: [
          ["PK", "questionnaire_session_id", "INTEGER"],
          ["FK", "user_id", "INTEGER"],
          ["", "started_at", "TIMESTAMP"],
          ["", "completed_at", "TIMESTAMP"],
          ["", "status", "TEXT"]
        ]
      },
      question_answer: {
        x: 70, y: 1370, w: 460,
        attrs: [
          ["PK", "question_answer_id", "INTEGER"],
          ["FK", "questionnaire_session_id", "INTEGER"],
          ["FK", "question_id", "INTEGER"],
          ["FK", "question_option_id", "INTEGER"],
          ["", "answer_text", "TEXT"],
          ["", "answer_number", "NUMERIC"]
        ]
      },
      product_category: {
        x: 1320, y: 560, w: 430,
        attrs: [
          ["PK", "product_category_id", "INTEGER"],
          ["UNIQUE", "category_name", "TEXT"]
        ]
      },
      product: {
        x: 2020, y: 520, w: 450,
        attrs: [
          ["PK", "product_id", "INTEGER"],
          ["FK", "product_category_id", "INTEGER"],
          ["FK", "partner_shop_id", "INTEGER"],
          ["", "external_product_id", "TEXT"],
          ["", "product_name", "TEXT"],
          ["", "description", "TEXT"],
          ["", "price", "NUMERIC"],
          ["", "image_url", "TEXT"],
          ["", "availability", "TEXT"],
          ["", "affiliate_link", "TEXT"],
          ["", "last_checked_at", "TIMESTAMP"]
        ]
      },
      recommendation: {
        x: 1320, y: 920, w: 470,
        attrs: [
          ["PK", "recommendation_id", "INTEGER"],
          ["FK", "questionnaire_session_id", "INTEGER"],
          ["FK", "product_id", "INTEGER"],
          ["", "reason_text", "TEXT"],
          ["", "score", "NUMERIC"],
          ["", "rank_position", "INTEGER"],
          ["", "created_at", "TIMESTAMP"]
        ]
      },
      favorite: {
        x: 1320, y: 1360, w: 390,
        attrs: [
          ["PK", "favorite_id", "INTEGER"],
          ["FK", "user_id", "INTEGER"],
          ["FK", "product_id", "INTEGER"],
          ["", "created_at", "TIMESTAMP"]
        ]
      },
      reminder: {
        x: 600, y: 1620, w: 390,
        attrs: [
          ["PK", "reminder_id", "INTEGER"],
          ["FK", "user_id", "INTEGER"],
          ["", "title", "TEXT"],
          ["", "reminder_date", "TIMESTAMP"],
          ["", "occasion", "TEXT"],
          ["", "is_done", "BOOLEAN"],
          ["", "created_at", "TIMESTAMP"]
        ]
      },
      affiliate_sale: {
        x: 2020, y: 1320, w: 450,
        attrs: [
          ["PK", "affiliate_sale_id", "INTEGER"],
          ["FK", "user_id", "INTEGER"],
          ["FK", "partner_shop_id", "INTEGER"],
          ["FK", "product_id", "INTEGER"],
          ["FK", "product_category_id", "INTEGER"],
          ["", "sale_date", "TIMESTAMP"],
          ["", "sale_amount", "NUMERIC"],
          ["", "commission_amount", "NUMERIC"],
          ["", "status", "TEXT"]
        ]
      }
    };

    const relationships = [
      ["role", "app_user", "besitzt", { fromSide: "right", toSide: "left", fromOffset: -20, toOffset: -60 }],
      ["role", "partner_shop", "besitzt", { fromSide: "top", toSide: "top", fromOffset: 90, toOffset: -90, via: [[230, 40], [1350, 40]] }],
      ["app_user", "questionnaire_session", "startet", { fromSide: "bottom", toSide: "top", fromOffset: -60, toOffset: -80 }],
      ["question", "question_option", "enthält", { fromSide: "right", toSide: "left", fromOffset: -25, toOffset: -20 }],
      ["question", "question_rule", "steuert nächste Frage", { fromSide: "bottom", toSide: "top", fromOffset: -100, toOffset: -90 }],
      ["question_option", "question_rule", "löst aus", { fromSide: "bottom", toSide: "right", fromOffset: -120, toOffset: -10, via: [[720, 930], [520, 930]] }],
      ["questionnaire_session", "question_answer", "enthält", { fromSide: "left", toSide: "right", fromOffset: 40, toOffset: -20, via: [[540, 1160], [540, 1470]] }],
      ["question", "question_answer", "wird beantwortet", { fromSide: "bottom", toSide: "top", fromOffset: 90, toOffset: -120, via: [[360, 1280], [180, 1280]] }],
      ["question_option", "question_answer", "wird ausgewählt", { fromSide: "bottom", toSide: "top", fromOffset: 110, toOffset: 120, via: [[920, 1290], [380, 1290]] }],
      ["questionnaire_session", "recommendation", "erzeugt", { fromSide: "right", toSide: "left", fromOffset: -40, toOffset: -70 }],
      ["product", "recommendation", "wird empfohlen", { fromSide: "left", toSide: "right", fromOffset: 0, toOffset: -30, via: [[1880, 800], [1880, 1010]] }],
      ["product_category", "product", "gruppiert", { fromSide: "right", toSide: "left", fromOffset: -25, toOffset: -100 }],
      ["partner_shop", "product", "bietet an", { fromSide: "right", toSide: "top", fromOffset: 50, toOffset: -100, via: [[1800, 230], [1800, 520]] }],
      ["app_user", "favorite", "speichert", { fromSide: "right", toSide: "left", fromOffset: 35, toOffset: -20, via: [[1120, 260], [1120, 1460]] }],
      ["product", "favorite", "wird gemerkt", { fromSide: "left", toSide: "right", fromOffset: 120, toOffset: -20, via: [[1840, 940], [1840, 1460]] }],
      ["app_user", "reminder", "erstellt", { fromSide: "bottom", toSide: "top", fromOffset: 90, toOffset: 0, via: [[925, 1540], [795, 1540]] }],
      ["app_user", "affiliate_sale", "verursacht", { fromSide: "right", toSide: "left", fromOffset: 90, toOffset: -80, via: [[1100, 330], [1100, 1250], [1940, 1250]] }],
      ["product", "affiliate_sale", "wird verkauft", { fromSide: "bottom", toSide: "top", fromOffset: 0, toOffset: 0 }],
      ["partner_shop", "affiliate_sale", "erhält Sale", { fromSide: "bottom", toSide: "top", fromOffset: 120, toOffset: -120, via: [[1660, 360], [1660, 1240], [2140, 1240]] }],
      ["product_category", "affiliate_sale", "wird ausgewertet", { fromSide: "bottom", toSide: "left", fromOffset: 80, toOffset: 80, via: [[1650, 820], [1650, 1570], [2020, 1570]] }]
    ];

    const svgNS = "http://www.w3.org/2000/svg";
    const entityLayer = document.getElementById("entities");
    const relationshipLineLayer = document.getElementById("relationshipLines");
    const relationshipLabelLayer = document.getElementById("relationshipLabels");

    function entityHeight(entity) {
      return 46 + entity.attrs.length * 26 + 14;
    }

    function center(entity) {
      return {
        x: entity.x + entity.w / 2,
        y: entity.y + entityHeight(entity) / 2
      };
    }

    function anchor(entity, side, offset = 0) {
      const h = entityHeight(entity);
      const cx = entity.x + entity.w / 2;
      const cy = entity.y + h / 2;

      if (side === "right") return { x: entity.x + entity.w, y: cy + offset, side };
      if (side === "left") return { x: entity.x, y: cy + offset, side };
      if (side === "bottom") return { x: cx + offset, y: entity.y + h, side };
      return { x: cx + offset, y: entity.y, side };
    }

    function cardinalityPosition(point, value) {
      const distance = 20;
      if (point.side === "right") return { x: point.x + distance, y: point.y - 8, anchor: "start", value };
      if (point.side === "left") return { x: point.x - distance, y: point.y - 8, anchor: "end", value };
      if (point.side === "bottom") return { x: point.x, y: point.y + distance, anchor: "middle", value };
      return { x: point.x, y: point.y - distance, anchor: "middle", value };
    }

    function createSvgElement(name, attrs = {}) {
      const el = document.createElementNS(svgNS, name);
      for (const [key, value] of Object.entries(attrs)) {
        el.setAttribute(key, value);
      }
      return el;
    }

    function drawEntity(name, entity) {
      const group = createSvgElement("g", { class: "entity" });
      const h = entityHeight(entity);

      group.appendChild(createSvgElement("rect", {
        x: entity.x,
        y: entity.y,
        width: entity.w,
        height: h,
        class: "outer"
      }));

      group.appendChild(createSvgElement("rect", {
        x: entity.x,
        y: entity.y,
        width: entity.w,
        height: 42,
        class: "head"
      }));

      const title = createSvgElement("text", {
        x: entity.x + 14,
        y: entity.y + 27,
        class: "title"
      });
      title.textContent = name;
      group.appendChild(title);

      let y = entity.y + 70;
      entity.attrs.forEach(([key, attr, type]) => {
        let attrX = entity.x + 14;
        if (key) {
          const tag = createSvgElement("text", {
            x: entity.x + 14,
            y,
            class: `tag ${key.toLowerCase()}`
          });
          tag.textContent = key;
          group.appendChild(tag);
          attrX = entity.x + 76;
        }

        const attrText = createSvgElement("text", {
          x: attrX,
          y,
          class: "attr"
        });
        attrText.textContent = attr;
        group.appendChild(attrText);

        const typeText = createSvgElement("text", {
          x: entity.x + entity.w - 125,
          y,
          class: "type"
        });
        typeText.textContent = type;
        group.appendChild(typeText);

        y += 26;
      });

      entityLayer.appendChild(group);
    }

    function drawCardinality(point, value) {
      const pos = cardinalityPosition(point, value);
      const text = createSvgElement("text", {
        x: pos.x,
        y: pos.y,
        class: "cardinality",
        "text-anchor": pos.anchor
      });
      text.textContent = value;
      relationshipLabelLayer.appendChild(text);
    }

    function drawRelationship(fromName, toName, label, options = {}) {
      const from = anchor(entities[fromName], options.fromSide, options.fromOffset ?? 0);
      const to = anchor(entities[toName], options.toSide, options.toOffset ?? 0);
      const points = [from, ...(options.via ?? []).map(([x, y]) => ({ x, y })), to];
      const pathData = points.map((point, index) => `${index === 0 ? "M" : "L"} ${point.x} ${point.y}`).join(" ");
      const path = createSvgElement("path", {
        d: pathData,
        class: "relationship",
        "marker-start": "url(#dot)",
        "marker-end": "url(#dot)"
      });
      const title = createSvgElement("title");
      title.textContent = `${fromName} -> ${toName}: 1:n ${label}`;
      path.appendChild(title);
      relationshipLineLayer.appendChild(path);

      drawCardinality(from, "1");
      drawCardinality(to, "n");
    }

    relationships.forEach(([from, to, label, options]) => drawRelationship(from, to, label, options));
    Object.entries(entities).forEach(([name, entity]) => drawEntity(name, entity));

    let scale = 1;
    let panX = 24;
    let panY = 24;
    const pointers = new Map();
    let dragStartX = 0;
    let dragStartY = 0;
    let dragOriginX = 0;
    let dragOriginY = 0;
    let pinchStartDistance = 0;
    let pinchStartScale = 1;
    let pinchCenterX = 0;
    let pinchCenterY = 0;

    const diagram = document.getElementById("diagram");
    const canvasWrap = document.getElementById("canvasWrap");

    function applyZoom() {
      diagram.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    }

    function zoomAt(x, y, factor) {
      const previousScale = scale;
      const nextScale = Math.max(0.28, Math.min(1.8, scale * factor));
      const diagramX = (x - panX) / previousScale;
      const diagramY = (y - panY) / previousScale;
      scale = nextScale;
      panX = x - diagramX * scale;
      panY = y - diagramY * scale;
      applyZoom();
    }

    function fitToScreen() {
      const rect = canvasWrap.getBoundingClientRect();
      const padding = 6;
      const scaleX = (rect.width - padding * 2) / 2600;
      const scaleY = (rect.height - padding * 2) / 2200;
      scale = Math.max(0.28, Math.min(scaleX, scaleY));
      panX = (rect.width - 2600 * scale) / 2;
      panY = (rect.height - 2200 * scale) / 2;
      applyZoom();
    }

    canvasWrap.addEventListener("wheel", (event) => {
      event.preventDefault();
      const rect = canvasWrap.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      zoomAt(x, y, event.deltaY < 0 ? 1.035 : 1 / 1.035);
    }, { passive: false });

    function pointerDistance(a, b) {
      return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    }

    function pointerCenter(a, b) {
      const rect = canvasWrap.getBoundingClientRect();
      return {
        x: (a.clientX + b.clientX) / 2 - rect.left,
        y: (a.clientY + b.clientY) / 2 - rect.top
      };
    }

    canvasWrap.addEventListener("pointerdown", (event) => {
      canvasWrap.setPointerCapture(event.pointerId);
      pointers.set(event.pointerId, event);
      canvasWrap.classList.add("dragging");

      if (pointers.size === 1) {
        dragStartX = event.clientX;
        dragStartY = event.clientY;
        dragOriginX = panX;
        dragOriginY = panY;
      }

      if (pointers.size === 2) {
        const [first, second] = [...pointers.values()];
        pinchStartDistance = pointerDistance(first, second);
        pinchStartScale = scale;
        const center = pointerCenter(first, second);
        pinchCenterX = center.x;
        pinchCenterY = center.y;
      }
    });

    canvasWrap.addEventListener("pointermove", (event) => {
      if (!pointers.has(event.pointerId)) return;
      pointers.set(event.pointerId, event);

      if (pointers.size === 1) {
        panX = dragOriginX + event.clientX - dragStartX;
        panY = dragOriginY + event.clientY - dragStartY;
        applyZoom();
      }

      if (pointers.size === 2) {
        const [first, second] = [...pointers.values()];
        const distance = pointerDistance(first, second);
        if (pinchStartDistance <= 0) return;
        const nextScale = Math.max(0.28, Math.min(1.8, pinchStartScale * (distance / pinchStartDistance)));
        zoomAt(pinchCenterX, pinchCenterY, nextScale / scale);
      }
    });

    function endPointer(event) {
      pointers.delete(event.pointerId);
      if (pointers.size === 0) {
        canvasWrap.classList.remove("dragging");
      }
      if (pointers.size === 1) {
        const [remaining] = [...pointers.values()];
        dragStartX = remaining.clientX;
        dragStartY = remaining.clientY;
        dragOriginX = panX;
        dragOriginY = panY;
      }
    }

    canvasWrap.addEventListener("pointerup", endPointer);
    canvasWrap.addEventListener("pointercancel", endPointer);
    canvasWrap.addEventListener("dblclick", fitToScreen);

    window.addEventListener("resize", fitToScreen);
    fitToScreen();
  </script>
</body>
</html>
